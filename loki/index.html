<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loki | GNC Baby Agent</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; font-size: 16px; }
        .user { align-self: flex-end; background: #007aff; color: white; border-bottom-right-radius: 4px; }
        .loki { align-self: flex-start; background: #333; color: white; border-bottom-left-radius: 4px; }
        .reasoning { font-size: 12px; color: #888; margin-top: 4px; font-style: italic; }
        #input-area { padding: 15px; background: #111; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #007aff; border: none; color: white; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="msg loki">... (waking up)</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Talk to Loki..." autocomplete="off">
        <button onclick="send()">Send</button>
    </div>

    <script src="loki_browser.js"></script>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');

        async function init() {
            const greeting = await Loki.greet();
            addMsg(greeting, 'loki');
        }

        function addMsg(text, sender, reasoning = '') {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            if (reasoning) {
                const rDiv = document.createElement('div');
                rDiv.className = 'reasoning';
                rDiv.innerText = `Thought: ${reasoning}`;
                div.appendChild(rDiv);
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            addMsg(text, 'user');
            
            const result = await Loki.process(text);
            addMsg(result.reply, 'loki', result.reasoning.why);
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
        init();
    </script>
</body>
</html>
